apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend
  namespace: oranje-markt
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: frontend
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
---
