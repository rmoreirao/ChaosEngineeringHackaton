apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: oranje-markt
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'oranje-markt-backend'
        metrics_path: '/api/metrics'
        static_configs:
          - targets: ['backend:4000']
            labels:
              app: 'oranje-markt-backend'

      - job_name: 'oranje-markt-frontend'
        metrics_path: '/api/metrics'
        static_configs:
          - targets: ['frontend:80']
            labels:
              app: 'oranje-markt-frontend'

      - job_name: 'postgres-exporter'
        static_configs:
          - targets: ['postgres-exporter:9187']
            labels:
              app: 'oranje-markt-db'

      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
