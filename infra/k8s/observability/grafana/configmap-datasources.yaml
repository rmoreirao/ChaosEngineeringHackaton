apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: oranje-markt
data:
  datasources.yml: |
    apiVersion: 1

    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true
        uid: prometheus

      - name: Loki
        type: loki
        access: proxy
        url: http://loki:3100
        editable: true
        uid: loki
