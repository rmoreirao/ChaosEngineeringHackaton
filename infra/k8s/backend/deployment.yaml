apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: oranje-markt
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        - name: db-migrate
          image: devaihackathonacr.azurecr.io/oranje-markt-backend:latest
          imagePullPolicy: IfNotPresent
          command:
            - "sh"
            - "-c"
            - |
              echo "Waiting for database to be ready..."
              MAX_RETRIES=15
              RETRY_INTERVAL=2
              for i in $(seq 1 $MAX_RETRIES); do
                if npx prisma migrate deploy; then
                  echo "Migrations applied successfully"
                  npx prisma db seed || echo 'Seed skipped'
                  exit 0
                fi
                echo "Database not ready (attempt $i/$MAX_RETRIES), retrying in ${RETRY_INTERVAL}s..."
                sleep $RETRY_INTERVAL
              done
              echo "ERROR: Database not reachable after $MAX_RETRIES attempts"
              exit 1
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DATABASE_URL
      containers:
        - name: backend
          image: devaihackathonacr.azurecr.io/oranje-markt-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DATABASE_URL
          envFrom:
            - configMapRef:
                name: backend-config
          readinessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
