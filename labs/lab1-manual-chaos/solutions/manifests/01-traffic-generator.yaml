# Traffic generator: sends continuous HTTP requests to the backend API.
# Useful for establishing baseline metrics in Grafana and for load testing.
# Usage: kubectl apply -f labs/lab1-manual-chaos/solutions/manifests/01-traffic-generator.yaml
# Scale: kubectl scale deployment traffic-generator -n oranje-markt --replicas=5
# Cleanup: kubectl delete deployment traffic-generator -n oranje-markt
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic-generator
  namespace: oranje-markt
  labels:
    app: traffic-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traffic-generator
  template:
    metadata:
      labels:
        app: traffic-generator
    spec:
      containers:
        - name: traffic
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              echo "Starting traffic generator..."
              while true; do
                # Hit the products endpoint
                wget -q -O- http://backend:4000/api/products > /dev/null 2>&1
                # Hit the health endpoint
                wget -q -O- http://backend:4000/api/health > /dev/null 2>&1
                # Small delay between requests
                sleep 0.5
              done
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "50m"
