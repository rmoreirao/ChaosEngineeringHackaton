# Resource stress pod: consumes CPU and memory to test resource limits.
# Simulates a "noisy neighbor" or resource exhaustion scenario.
# Usage: kubectl apply -f labs/lab1-manual-chaos/solutions/manifests/02-resource-stress.yaml
# Cleanup: kubectl delete deployment resource-stress -n oranje-markt
apiVersion: apps/v1
kind: Deployment
metadata:
  name: resource-stress
  namespace: oranje-markt
  labels:
    app: resource-stress
spec:
  replicas: 1
  selector:
    matchLabels:
      app: resource-stress
  template:
    metadata:
      labels:
        app: resource-stress
    spec:
      containers:
        - name: cpu-stress
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              echo "Starting CPU stress..."
              # Spawn multiple CPU-burning processes
              for i in 1 2 3 4; do
                while true; do :; done &
              done
              wait
          resources:
            requests:
              memory: "64Mi"
              cpu: "500m"
            limits:
              memory: "128Mi"
              cpu: "1000m"
        - name: memory-stress
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              echo "Starting memory stress..."
              # Allocate increasing amounts of memory
              while true; do
                dd if=/dev/zero bs=1M count=10 2>/dev/null | cat > /dev/null
                sleep 1
              done
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "100m"
