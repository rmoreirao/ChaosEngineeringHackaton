# Fixed deployment: removed the invalid custom command.
# The container now uses the image's default entrypoint.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-crashloop
  namespace: oranje-markt
  labels:
    app: chaos-crashloop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chaos-crashloop
  template:
    metadata:
      labels:
        app: chaos-crashloop
    spec:
      containers:
        - name: web
          image: nginx:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "50m"
