# Fixed deployment: reasonable resource requests that fit on Standard_D2s_v3 nodes.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-resource
  namespace: oranje-markt
  labels:
    app: chaos-resource
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chaos-resource
  template:
    metadata:
      labels:
        app: chaos-resource
    spec:
      containers:
        - name: backend
          image: devaihackathonacr.azurecr.io/oranje-markt-backend:latest
          ports:
            - containerPort: 4000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DATABASE_URL
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
