# Fixed deployment: reasonable resource requests that fit on Standard_D2s_v3 nodes.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-resource
  namespace: oranje-markt
  labels:
    app: chaos-resource
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chaos-resource
  template:
    metadata:
      labels:
        app: chaos-resource
    spec:
      containers:
        - name: web
          image: nginx:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "50m"
