# Broken deployment: CrashLoopBackOff
# The container has a custom command that doesn't exist in the image.
# This causes the container to fail on startup, resulting in CrashLoopBackOff.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-crashloop
  namespace: oranje-markt
  labels:
    app: chaos-crashloop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chaos-crashloop
  template:
    metadata:
      labels:
        app: chaos-crashloop
    spec:
      containers:
        - name: web
          image: nginx:latest
          command: ["/bin/start-app"]
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "50m"
