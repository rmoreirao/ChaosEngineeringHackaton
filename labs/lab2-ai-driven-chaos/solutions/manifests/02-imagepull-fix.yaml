# Fixed deployment: correct image reference with existing tag.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-imagepull
  namespace: oranje-markt
  labels:
    app: chaos-imagepull
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chaos-imagepull
  template:
    metadata:
      labels:
        app: chaos-imagepull
    spec:
      containers:
        - name: backend
          image: devaihackathonacr.azurecr.io/oranje-markt-backend:latest
          ports:
            - containerPort: 4000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DATABASE_URL
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
