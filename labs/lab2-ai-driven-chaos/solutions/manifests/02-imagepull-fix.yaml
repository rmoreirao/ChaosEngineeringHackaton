# Fixed deployment: correct image reference with existing tag.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-imagepull
  namespace: oranje-markt
  labels:
    app: chaos-imagepull
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chaos-imagepull
  template:
    metadata:
      labels:
        app: chaos-imagepull
    spec:
      containers:
        - name: web
          image: nginx:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "50m"
