# Hardened backend deployment: 3 replicas, topology spread, PDB, and HPA
#
# IMPORTANT: Before applying, replace ACR_REGISTRY with your team's ACR:
#   export ACR_REGISTRY=$(kubectl get deploy backend -n oranje-markt -o jsonpath='{.spec.template.spec.containers[0].image}' | cut -d/ -f1)
#   sed "s|ACR_REGISTRY|$ACR_REGISTRY|g" 01-backend-hardened.yaml | kubectl apply -f -
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: oranje-markt
  labels:
    app: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: backend
      initContainers:
        - name: db-migrate
          image: ACR_REGISTRY/oranje-markt-backend:latest
          imagePullPolicy: IfNotPresent
          command:
            - "sh"
            - "-c"
            - |
              echo "Waiting for database to be ready..."
              MAX_RETRIES=15
              RETRY_INTERVAL=2
              for i in $(seq 1 $MAX_RETRIES); do
                if npx prisma migrate deploy; then
                  echo "Migrations applied successfully"
                  npx prisma db seed || echo 'Seed skipped'
                  exit 0
                fi
                echo "Database not ready (attempt $i/$MAX_RETRIES), retrying in ${RETRY_INTERVAL}s..."
                sleep $RETRY_INTERVAL
              done
              echo "ERROR: Database not reachable after $MAX_RETRIES attempts"
              exit 1
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DATABASE_URL
      containers:
        - name: backend
          image: ACR_REGISTRY/oranje-markt-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DATABASE_URL
          envFrom:
            - configMapRef:
                name: backend-config
          startupProbe:
            httpGet:
              path: /api/health
              port: 4000
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-pdb
  namespace: oranje-markt
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: backend
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: oranje-markt
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
